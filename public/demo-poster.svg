<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#09090b"/>
      <stop offset="100%" style="stop-color:#18181b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#9333ea"/>
      <stop offset="50%" style="stop-color:#ec4899"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c084fc"/>
      <stop offset="50%" style="stop-color:#f472b6"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <!-- Glow effects -->
  <circle cx="500" cy="350" r="350" fill="#9333ea" opacity="0.08"/>
  <circle cx="1400" cy="700" r="350" fill="#ec4899" opacity="0.06"/>
  <!-- Center content -->
  <text x="960" y="420" text-anchor="middle" font-family="Georgia, serif" font-weight="800" font-size="72" fill="white">See RoutineX in Action</text>
  <text x="960" y="500" text-anchor="middle" font-family="Arial, sans-serif" font-weight="400" font-size="32" fill="#a1a1aa">Watch how AI analyzes a dance routine in real-time</text>
  <!-- Play button -->
  <circle cx="960" cy="640" r="60" fill="url(#accent)" opacity="0.9"/>
  <polygon points="945,610 945,670 990,640" fill="white"/>
  <!-- Bottom text -->
  <text x="960" y="780" text-anchor="middle" font-family="Arial, sans-serif" font-weight="500" font-size="22" fill="#71717a">Tap to play</text>
</svg>
