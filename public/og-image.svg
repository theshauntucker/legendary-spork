<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#09090b"/>
      <stop offset="100%" style="stop-color:#18181b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#9333ea"/>
      <stop offset="50%" style="stop-color:#ec4899"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c084fc"/>
      <stop offset="50%" style="stop-color:#f472b6"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Glow effects -->
  <circle cx="300" cy="200" r="250" fill="#9333ea" opacity="0.12"/>
  <circle cx="900" cy="400" r="250" fill="#ec4899" opacity="0.1"/>
  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>
  <!-- Logo area -->
  <rect x="80" y="80" width="56" height="56" rx="12" fill="url(#accent)"/>
  <text x="108" y="118" text-anchor="middle" font-family="Georgia, serif" font-weight="800" font-size="36" fill="white">R</text>
  <text x="152" y="116" font-family="Arial, sans-serif" font-weight="700" font-size="26" fill="white">Routine</text>
  <text x="297" y="116" font-family="Arial, sans-serif" font-weight="700" font-size="26" fill="url(#textGrad)">X</text>
  <!-- Main headline -->
  <text x="80" y="260" font-family="Georgia, serif" font-weight="800" font-size="64" fill="white">Your Dancer's</text>
  <text x="80" y="340" font-family="Georgia, serif" font-weight="800" font-size="64" fill="url(#textGrad)">Secret Weapon</text>
  <!-- Subheadline -->
  <text x="80" y="400" font-family="Arial, sans-serif" font-weight="400" font-size="24" fill="#a1a1aa">AI-powered video analysis with competition-standard scoring.</text>
  <text x="80" y="435" font-family="Arial, sans-serif" font-weight="400" font-size="24" fill="#a1a1aa">Upload any routine. Get detailed feedback in under 5 minutes.</text>
  <!-- CTA pill -->
  <rect x="80" y="475" width="300" height="52" rx="26" fill="url(#accent)"/>
  <text x="230" y="508" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="20" fill="white">Join the Beta — $9.99</text>
  <!-- Score preview card -->
  <rect x="780" y="160" width="340" height="310" rx="20" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="810" y="200" font-family="Arial, sans-serif" font-weight="600" font-size="13" fill="#c084fc" letter-spacing="1">ANALYSIS REPORT</text>
  <text x="810" y="230" font-family="Arial, sans-serif" font-weight="700" font-size="18" fill="white">Teen Jazz Solo</text>
  <text x="1000" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-weight="800" font-size="56" fill="url(#textGrad)">274</text>
  <text x="1000" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-weight="400" font-size="14" fill="#a1a1aa">out of 300</text>
  <!-- Score bars -->
  <text x="810" y="345" font-family="Arial, sans-serif" font-size="13" fill="#a1a1aa">Technique</text>
  <rect x="810" y="352" width="280" height="6" rx="3" fill="rgba(255,255,255,0.1)"/>
  <rect x="810" y="352" width="257" height="6" rx="3" fill="url(#accent)"/>
  <text x="810" y="385" font-family="Arial, sans-serif" font-size="13" fill="#a1a1aa">Performance</text>
  <rect x="810" y="392" width="280" height="6" rx="3" fill="rgba(255,255,255,0.1)"/>
  <rect x="810" y="392" width="265" height="6" rx="3" fill="url(#accent)"/>
  <text x="810" y="425" font-family="Arial, sans-serif" font-size="13" fill="#a1a1aa">Choreography</text>
  <rect x="810" y="432" width="280" height="6" rx="3" fill="rgba(255,255,255,0.1)"/>
  <rect x="810" y="432" width="256" height="6" rx="3" fill="url(#accent)"/>
  <!-- Bottom bar -->
  <text x="80" y="580" font-family="Arial, sans-serif" font-weight="500" font-size="16" fill="#71717a">routinex.app</text>
  <text x="1120" y="580" text-anchor="end" font-family="Arial, sans-serif" font-weight="500" font-size="16" fill="#71717a">347 of 500 beta spots claimed</text>
</svg>
