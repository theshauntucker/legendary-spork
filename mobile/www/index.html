<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>RoutineX</title>
  <style>
    body { margin: 0; background: #0a0a0a; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: system-ui; color: #fff; }
    .loader { text-align: center; }
    .spinner { width: 32px; height: 32px; border: 3px solid rgba(255,255,255,0.1); border-top-color: #a855f7; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="loader">
    <div class="spinner"></div>
    <p>Loading RoutineX...</p>
  </div>
  <script>
    // This page is only shown briefly while the WebView connects to routinex.org
    // In production, server.url in capacitor.config.ts redirects immediately
    window.location.href = 'https://routinex.org';
  </script>
</body>
</html>
