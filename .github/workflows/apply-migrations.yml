name: Apply Supabase Migrations

on:
  workflow_dispatch:
  push:
    paths:
      - "supabase-coda-*.sql"
      - "supabase/migrations/**.sql"
      - "scripts/apply-migration.mjs"
      - "scripts/apply-all-pending.mjs"
      - "scripts/_supabase-api.mjs"
      - ".github/workflows/apply-migrations.yml"

concurrency:
  group: apply-migrations-${{ github.ref }}
  cancel-in-progress: false

jobs:
  apply:
    name: Apply pending migrations
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: xkckvrbxaessudolxhte
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Verify secret is present
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN repo secret is not set. Add it at Settings -> Secrets and variables -> Actions."
            exit 1
          fi
          echo "Secret present (length: ${#SUPABASE_ACCESS_TOKEN})"
          echo "Project: $SUPABASE_PROJECT_REF"

      - name: Apply pending migrations
        run: node scripts/apply-all-pending.mjs

      - name: Upload apply-migrations.log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: apply-migrations-log
          path: apply-migrations.log
          if-no-files-found: warn
          retention-days: 30
